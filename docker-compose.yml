services:

  postgres:
    image: postgres:15
    container_name: crypto_postgres_c
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/ddl:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"

  airflow-init:
    image: apache/airflow:2.9.0
    container_name: airflow-init_crypto
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AF_USER_USERNAME=${AF_USER_USERNAME}
      - AF_USER_PASS=${AF_USER_PASS}
      - AF_USER_MAIL=${AF_USER_MAIL}
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${AIRFLOW_DB}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./app:/opt/airflow/app 
      - ./sql:/opt/airflow/sql
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username ${AF_USER_USERNAME} --password ${AF_USER_PASS} --firstname Admin --lastname User --role Admin --email ${AF_USER_MAIL}
      "

  airflow:
    image: apache/airflow:2.9.0
    container_name: airflow_crypto
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: 
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${AIRFLOW_DB}
      - PYTHONPATH=/app
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./app:/opt/airflow/app 
      - ./sql:/opt/airflow/sql
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: >
      bash -c "
        airflow scheduler &
        airflow webserver
      "

volumes:
  postgres_data: